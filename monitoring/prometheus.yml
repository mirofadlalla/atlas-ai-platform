global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'atlas-monitoring'

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'atlas-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    # Ensure proper error handling for metrics endpoint
    honor_timestamps: true

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'
    scrape_interval: 15s
