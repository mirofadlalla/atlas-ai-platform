global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'atlas-standalone'

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # STANDALONE MODE: API running on HOST MACHINE (Windows localhost:8000)
  # This uses host.docker.internal which Docker Desktop resolves to your host machine IP
  - job_name: 'atlas-api'
    static_configs:
      - targets: ['host.docker.internal:8000']  # Reaches localhost:8000 on your Windows machine
    metrics_path: '/metrics'
    scrape_interval: 10s        # Scrape every 10 seconds
    scrape_timeout: 5s
    honor_timestamps: true

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']  # Prometheus scrapes itself
    scrape_interval: 15s
